<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f4f4;
        }

        .navbar{
            background:#111827;
            padding:20px;
        }

        .navbar h1{
            color:white;
            margin:0;
            font-weight:bold;
        }

        .blog-card{
            border:none;
            border-radius:15px;
            overflow:hidden;
            transition:0.3s;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .blog-card:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 20px rgba(0,0,0,0.15);
        }

        .card-body{
            padding:25px;
        }

        .blog-title{
            font-size:28px;
            font-weight:bold;
        }

        .blog-content{
            color:#555;
            margin-top:10px;
        }

        .btn-group{
            margin-top:20px;
        }

    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="container d-flex justify-content-between align-items-center">

        <h1>My Blog</h1>

        <a href="{% url 'create_post' %}" class="btn btn-light">
            + Create Post
        </a>

    </div>
</div>

<div class="container mt-5">

    <div class="row">

        {% for post in posts %}

        <div class="col-md-6 mb-4">

            <div class="card blog-card h-100">

                <div class="card-body">

                    <h2 class="blog-title">
                        {{ post.title }}
                    </h2>

                    <p class="text-muted">
                        {{ post.created_at }}
                    </p>

                    <p class="blog-content">
                        {{ post.content|truncatewords:30 }}
                    </p>

                    <div class="btn-group">

                        <a href="{% url 'post_detail' post.id %}" class="btn btn-dark">
                            Read More
                        </a>

                        <a href="{% url 'update_post' post.id %}" class="btn btn-warning">
                            Edit
                        </a>

                        <a href="{% url 'delete_post' post.id %}" class="btn btn-danger">
                            Delete
                        </a>

                    </div>

                </div>

            </div>

        </div>

        {% empty %}

        <h3>No blog posts available.</h3>

        {% endfor %}

    </div>

</div>

</body>
</html>
