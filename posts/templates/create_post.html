<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f4f4;
        }

        .form-box{
            max-width:700px;
            margin:auto;
            margin-top:50px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">

    <div class="form-box">

        <h1 class="mb-4">Create New Blog</h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-dark">
                Publish Post
            </button>

        </form>

    </div>

</div>

</body>
</html>
